<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spinning Wheel</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/x-icon" href="minecraft.png">
    
</head>

<body>

<h1>🎡 Minecraft Item Wheel</h1>

<div class="wheel-container">
    <div class="pointer"></div>
    <canvas id="wheel" class="wheel" width="400" height="400"></canvas>
</div>

<button class="spin" onclick="spin()">SPIN</button>

<!-- 🎉 POPUP -->
<div id="popup" class="popup">
    <div class="popup-content">
        <h2 id="popupText"></h2>
        <button class="ok" onclick="closePopup()">OK</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
